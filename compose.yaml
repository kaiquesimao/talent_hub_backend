services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: talent_hub_postgres
    environment:
      - 'POSTGRES_DB=talent_hub'
      - 'POSTGRES_PASSWORD=talent_pass'
      - 'POSTGRES_USER=talent_user'
    ports:
      - '5432:5432'
    volumes:
      - 'talent_hub_pg_data:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U talent_user -d talent_hub']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  talent_hub_pg_data:
